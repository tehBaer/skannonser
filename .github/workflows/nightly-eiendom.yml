name: Manual Eiendom Scrape (No Google APIs)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scrape-db-only:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure database directory exists
        run: mkdir -p main/database

      - name: Restore latest persisted SQLite database (if any)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: nightly-eiendom.yml
          name: properties-db
          path: main/database
          if_no_artifact_found: warn

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r main/config/requirements.txt

      - name: Run eiendom scrape (database only, no Google APIs)
        run: python main/tools/run_eiendom_github.py

      - name: Upload persisted SQLite database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: properties-db
          path: |
            main/database/properties.db
            main/database/properties.db-wal
            main/database/properties.db-shm
          if-no-files-found: warn
          retention-days: 90
          overwrite: true
