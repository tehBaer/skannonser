# Domain configuration — the tuning surface of the system.
# Values ported 1:1 from main/config/filters.py and main/post_process.py on 2026-07-20.

[filters]
sheets_max_price = 7500000
url_max_price = 7500000
min_bra_i = 70
include_unlisted = true

[coords]
lat_min = 57.0
lat_max = 72.0
lng_min = 4.0
lng_max = 32.0

[travel]
reuse_within_meters = 300
max_travel_minutes = 360

[crawl]
# Polite-access pacing for the FINN crawl/refresh (seconds). Each pair is a
# (min, max) range a uniform jittered delay is drawn from. Deliberately slow:
# a run fetches only tens of pages/ads, so wide human-shaped gaps cost little
# wall-clock (whole run stays well under an hour) while keeping load gentle.
page_delay_min_s = 2.0
page_delay_max_s = 8.0
fetch_delay_min_s = 1.0
fetch_delay_max_s = 5.0
listing_delay_min_s = 1.0
listing_delay_max_s = 5.0

[budget]
routes_monthly_cap = 9000
geocode_monthly_cap = 9000
warn_pcts = [50, 80]
routes_rpm = 60
geocode_rpm = 60

[[destinations]]
key = "brj"
label = "BRJ (work, Sandvika)"
address = "Rådmann Halmrasts Vei 5"
df_column = "PENDL RUSH BRJ"
db_column = "pendl_rush_brj"

