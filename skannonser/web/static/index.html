<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>skannonser</title>
  <link rel="stylesheet" href="/vendor/maplibre-gl.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h1 class="brand">skannonser</h1>

      <section class="panel">
        <h2>Lag</h2>
        <label class="toggle"><input type="checkbox" id="toggle-eie" checked> Eie</label>
        <label class="toggle"><input type="checkbox" id="toggle-dnb" checked> DNB</label>
        <label class="toggle"><input type="checkbox" id="toggle-sold"> Solgt</label>
      </section>

      <section class="panel" id="boligtype-filter-panel">
        <h2>Boligtype</h2>
        <div id="boligtype-filter" class="legend muted">Laster …</div>
        <div id="source-legend" class="legend legend-keys"></div>
      </section>

      <section class="panel" id="filter-panel">
        <h2>Filtre</h2>
        <div id="metric-filters" class="muted">Laster …</div>
      </section>

      <section class="panel" id="stations-panel">
        <h2>Stasjoner</h2>
        <label class="toggle"><input type="checkbox" id="toggle-stations"> Vis stasjoner og radius</label>
        <label class="toggle"><input type="checkbox" id="toggle-hide-outside"> Ton ned utenfor radius</label>
        <div class="filter-row">
          <div class="filter-head">
            <span>Maks tid til Sandvika</span>
            <span class="filter-val" id="sandvika-val"></span>
          </div>
          <input type="range" id="sandvika-max" min="0" max="120" step="1">
        </div>
        <label class="toggle"><input type="checkbox" id="toggle-transfer"> Inkluder bytte (via Oslo S)</label>
        <h3 class="subhead">Linjer</h3>
        <div id="line-toggles" class="legend muted">Laster …</div>
      </section>

      <section class="panel" id="missing-coords-panel">
        <h2>Uten koordinater</h2>
        <div id="missing-coords" class="muted">Laster …</div>
      </section>

      <section class="panel" id="table-link-panel">
        <h2>Tabell</h2>
        <a href="/table" id="nav-table">Tabell</a>
      </section>

      <div id="status" class="status muted"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script src="/vendor/maplibre-gl.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
